name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_Riyandi.py

      - name: Commit and Push Cleaned Data
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add preprocessing/telco_preprocessing/telco_cleaned.csv
          # Hanya melakukan commit jika ada perubahan data
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update cleaned dataset" && git push)